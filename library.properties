sentence=Passive USB 1.1 packet sniffer using the RP2040 PIO coprocessor.
paragraph=Captures Low-Speed (1.5 Mbps) and Full-Speed (12 Mbps) USB packets passively through high-impedance GPIO tapping. Uses a single PIO state machine for deterministic 8x oversampled line sampling, DMA ping-pong buffering for zero-copy data transfer, and a full software decoder implementing clock recovery, NRZI decoding, bit-unstuffing, packet framing, and CRC5/CRC16 verification. Delivers structured USBPacket objects through a callback API. Dual-core ready. Ideal for protocol analysis, HID device monitoring, and USB debugging.
